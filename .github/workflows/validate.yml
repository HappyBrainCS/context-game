name: Validate Submission
on: [pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history so we can diff against main
      - name: Check for modified existing files (allow _index.md)
        run: |
          # Fetch main branch for comparison
          git fetch origin main --depth=1 2>/dev/null || true
          BASE="origin/main"
          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            echo "⚠ Could not find $BASE, trying alternative refs"
            # Use the event payload to find the base ref
            BASE="refs/remotes/origin/${{ github.base_ref }}"
          fi
          MODIFIED=$(git diff --name-only "$BASE"...HEAD --diff-filter=M || echo "")
          if [ -n "$MODIFIED" ]; then
            # Filter out _index.md — it's the one file that gets updated on every submission
            VIOLATIONS=""
            while IFS= read -r f; do
              if [ -z "$f" ]; then continue; fi
              # Skip _index.md files, wiki/index.md, and validate.yml
              case "$f" in */_index.md|wiki/index.md|.github/workflows/validate.yml) continue ;; esac
              VIOLATIONS="$VIOLATIONS$f\n"
            done <<< "$MODIFIED"
            if [ -n "$VIOLATIONS" ]; then
              echo "ERROR: Modified existing files (append-only violation):"
              echo -e "$VIOLATIONS"
              exit 1
            fi
            echo "⚠ _index.md updated (expected)"
          fi
          echo "✓ No existing files illegally modified"
      - name: Validate new file structure
        run: |
          BASE="origin/main"
          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            BASE="refs/remotes/origin/${{ github.base_ref }}"
          fi
          NEW_FILES=$(git diff --name-only "$BASE"...HEAD --diff-filter=A || echo "")
          for f in $NEW_FILES; do
            [ -z "$f" ] && continue
            # Check filename doesn't contain path traversal
            if echo "$f" | grep -q '\.\.'; then
              echo "ERROR: Path traversal detected in $f"
              exit 1
            fi
            # Check file size < 100KB
            if [ -f "$f" ] && [ "$(stat --format=%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)" -gt 102400 ]; then
              echo "ERROR: File too large: $f"
              exit 1
            fi
            # Check markdown files have valid frontmatter
            if echo "$f" | grep -q '\.md$'; then
              if ! head -1 "$f" | grep -q '^---$'; then
                echo "ERROR: Missing frontmatter delimiter in $f"
                exit 1
              fi
            fi
          done
          echo "✓ All new files valid"
