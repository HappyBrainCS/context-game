name: Auto-merge Validated PRs
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
  check_suite:
    types: [completed]
  status: {}

jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - id: automerge
        name: Auto-merge when CI passes
        uses: pascalgn/automerge-action@v0.16
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "automerge,!wip"
          MERGE_FORKS: "true"
          MERGE_METHOD: "squash"
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          MERGE_RETRIES: "3"
          MERGE_RETRY_SLEEP: "30000"
          UPDATE_METHOD: "rebase"
